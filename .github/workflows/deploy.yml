name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build name-that-movie
        working-directory: apps/name-that-movie
        run: |
          npm install --legacy-peer-deps --ignore-scripts
          timeout 180 npm run build
          RESULT=$?
          if [ $RESULT -ne 0 ] && [ $RESULT -ne 124 ]; then exit $RESULT; fi
        env:
          NODE_OPTIONS: --openssl-legacy-provider

      - name: Build concentration
        working-directory: apps/concentration
        run: npm install --legacy-peer-deps && npm run build

      - name: Install main site dependencies
        run: npm ci

      - name: Build main site
        run: npm run build

      - name: Merge sub-app outputs
        run: |
          cp -r apps/name-that-movie/dist out/name-that-movie
          cp -r apps/concentration/build out/concentration

      - name: Deploy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: 'out/'
          target: '/home/scottnash/public_html'
          strip_components: 1
          rm: true
